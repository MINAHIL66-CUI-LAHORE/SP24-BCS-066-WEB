<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Adidas – Impossible Is Nothing</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- ===== NAV ===== -->
  <header class="header">
    <nav class="nav">
      <div class="nav__top">
        <ul class="nav__utility">
          <li><a href="#">Find a Store</a></li>
          <li>|</li>
          <li><a href="#">Help</a></li>
          <li>|</li>
          <li><a href="#">Join</a></li>
          <li>|</li>
          <li><a href="#">Log In</a></li>
        </ul>
      </div>
      <div class="nav__main">
        <div class="nav__logo">
          
           <img src="Assets/logo.jpg" alt="Adidas Logo" style="width:80px;display:block;"/>

        </div>
        <ul class="nav__links" id="navLinks">
          <li><a href="#">Men</a></li>
          <li><a href="#">Women</a></li>
          <li><a href="#">Kids</a></li>
          <li><a href="#">Sport</a></li>
          <li class="nav__sale"><a href="#">Sale</a></li>
          <li><a href="#">New</a></li>
        </ul>
        <div class="nav__actions">
          <button class="icon-btn" aria-label="Search">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          </button>
          <button class="icon-btn" aria-label="Favourites">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
          </button>
          <button class="icon-btn cart-btn" aria-label="Cart">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.99 1.61h9.72a2 2 0 001.99-1.61L23 6H6"/></svg>
            <span class="cart-count">3</span>
          </button>
        </div>
      </div>
    </nav>
  </header>
  <!-- ===== HERO ===== -->
<section class="hero">
    <div class="hero__bg">
      <video autoplay muted loop playsinline>
        <source src="Assets/Handball_Spezial_Shoes_Blue_BD7633_video.webm" type="video/webm">
      </video>
      <img src="Assets/bg.jpg" alt="Hero background" class="hero__bg-fallback"/>
    </div>
    <div class="hero__content">
      <p class="hero__eyebrow">New Collection 2025</p>
      <h1 class="hero__title">IMPOSSIBLE<br><span>IS NOTHING</span></h1>
      <p class="hero__subtitle">Ultraboost 25 — Engineered for your fastest.</p>
      <div class="hero__cta">
        <a href="#" class="btn btn--white">Shop Now</a>
        <a href="#" class="btn btn--outline">Explore</a>
      </div>
    </div>
    <div class="hero__badge">
      <span>NEW</span>
      <span>SS25</span>
    </div>
  </section>

</body>
</html>
